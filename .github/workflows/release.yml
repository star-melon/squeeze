name: Release

# Trigger by pushing a version tag (e.g. v0.1.0), or run manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build ${{ matrix.arch }} DMG
    strategy:
      fail-fast: false
      matrix:
        include:
          # GitHub-hosted Intel runners (macos-13) are deprecated/unreliable and
          # leave the x64 job stuck "queued", so we build Apple Silicon only here.
          # Intel Mac users can build locally with: npm run build:mac
          - os: macos-14   # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build DMG (${{ matrix.arch }})
        # Bundled ffmpeg/ffprobe/cwebp install for the runner's native arch,
        # so the runner arch must match the target arch. Unsigned build.
        run: npx --no-install electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: squeeze-mac-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error

  build-win:
    name: Build Windows installer + portable zip
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build installer + zip (x64)
        run: npx --no-install electron-builder --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: squeeze-win
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-win]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Squeeze ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.zip
